<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phân loại Nhóm ngành - ICB Vietnam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/static/js/main.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { navy: '#1e3a8a' } } } }
    </script>
    <style>
        .table-nowrap td, .table-nowrap th { white-space: nowrap; }
        /* Hiệu ứng ẩn hiện menu lọc */
        #filter-menu.hidden { display: none; }
        #filter-menu { position: absolute; right: 0; top: 110%; z-index: 50; width: 250px; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 flex h-screen overflow-hidden">

    <aside class="w-64 bg-navy text-white flex flex-col shadow-lg hidden md:flex z-20">
        <div class="h-16 flex items-center justify-center border-b border-blue-800">
            <i class="fa-solid fa-chart-pie text-2xl mr-2"></i>
            <h1 class="text-xl font-bold tracking-wider">ICB VIETNAM</h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto font-medium text-sm">
            <a href="index.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition"><i class="fa-solid fa-house w-6"></i> Trang chủ</a>
            <a href="quan-ly-ck.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition"><i class="fa-solid fa-building w-6"></i> Quản lý mã chứng khoán</a>
            <a href="nhom-nganh.html" class="flex items-center px-4 py-3 bg-blue-800 rounded-lg shadow-inner"><i class="fa-solid fa-users w-6"></i> Nhóm ngành</a>
            <a href="icb.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition"><i class="fa-solid fa-layer-group w-6"></i> Quản lý danh mục ICB</a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 bg-white shadow flex items-center justify-between px-6 z-10">
            <div class="flex items-center text-gray-500 font-medium text-sm">
                <span>Hệ thống</span> <i class="fa-solid fa-chevron-right text-[10px] mx-2"></i> <span class="text-navy font-bold">Phân loại Nhóm ngành</span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6">
            <div class="flex justify-between items-center mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-100 relative">
                <div class="flex items-center gap-3">
                    <span class="text-xs text-gray-400 font-medium italic">Hiển thị:</span>
                    <select id="rows-per-page" class="border border-gray-300 rounded-lg px-3 py-1.5 text-xs outline-none focus:border-navy bg-white shadow-sm">
                        <option value="10">10 dòng</option>
                        <option value="20">20 dòng</option>
                        <option value="50">50 dòng</option>
                    </select>
                </div>

                <div class="relative">
                    <button id="btn-toggle-filter" class="w-10 h-10 flex items-center justify-center rounded-full bg-gray-50 hover:bg-navy hover:text-white transition-all shadow-sm border border-gray-200">
                        <i class="fa-solid fa-filter"></i>
                    </button>

                    <div id="filter-menu" class="hidden bg-white rounded-xl shadow-xl border border-gray-100 p-4 animate-fade-in">
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Chọn Level</label>
                                <select id="display-level-mode" class="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:border-navy">
                                    <option value="l4">Level 4 (Mặc định)</option>
                                    <option value="l3">Level 3</option>
                                    <option value="l2">Level 2</option>
                                    <option value="l1">Level 1</option>
                                    <option value="all">Tất cả các Level</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Sàn giao dịch</label>
                                <select id="filter-exchange" class="w-full border rounded-lg px-3 py-2 text-sm outline-none focus:border-navy">
                                    <option value="all">Tất cả các sàn</option>
                                </select>
                            </div>
                            <button id="btn-apply-filter" class="w-full bg-navy text-white py-2 rounded-lg text-sm font-bold shadow-md hover:bg-blue-900">Áp dụng lọc</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse table-nowrap">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-xs uppercase font-bold tracking-wider">
                                <th class="px-6 py-4 border-b">Ngành ICB</th>
                                <th class="px-6 py-4 border-b w-24 text-center">Level</th>
                                <th class="px-6 py-4 border-b w-32">Mã chứng</th>
                                <th class="px-6 py-4 border-b">Tên công t</th>
                                <th class="px-6 py-4 border-b w-32">Sàn giao d</th>
                            </tr>
                        </thead>
                        <tbody id="industry-table-body" class="text-sm text-gray-700 divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>

                <div class="px-6 py-4 bg-gray-50 flex items-center justify-between border-t border-gray-100">
                    <div id="pagination-info" class="text-xs text-gray-500 italic font-medium">Đang tải...</div>
                    <div id="pagination-controls"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/industry.js"></script>
</body>
</html>
