<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tra cứu tổng hợp - ICB Vietnam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/static/js/main.js"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { navy: '#1e3a8a' } } } }
    </script>
    <style>
        .table-nowrap td, .table-nowrap th { white-space: nowrap; }
        #filter-menu.hidden { display: none; }
        /* Hiệu ứng mượt cho dropdown */
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 flex h-screen overflow-hidden">

    <aside class="w-64 bg-navy text-white flex flex-col shadow-lg hidden md:flex z-20">
        <div class="h-16 flex items-center justify-center border-b border-blue-800">
            <i class="fa-solid fa-magnifying-glass-chart text-2xl mr-2"></i>
            <h1 class="text-xl font-bold tracking-wider">ICB LOOKUP</h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto font-medium text-sm">
            <a href="index.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition"><i class="fa-solid fa-house w-6"></i> Trang chủ</a>
            <a href="tra-cuu.html" class="flex items-center px-4 py-3 bg-blue-800 rounded-lg shadow-inner"><i class="fa-solid fa-magnifying-glass w-6"></i> Tra cứu tổng hợp</a>
            <a href="quan-ly-ck.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition"><i class="fa-solid fa-building w-6"></i> Quản lý mã chứng khoán</a>
            <a href="nhom-nganh.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition"><i class="fa-solid fa-users w-6"></i> Nhóm ngành</a>
            <a href="nhomcongty.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition"><i class="fa-solid fa-folder-tree w-6"></i> Nhóm công ty</a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 bg-white shadow flex items-center justify-between px-6 z-10">
            <div class="flex items-center text-gray-500 font-medium text-sm">
                <span>Hệ thống</span> <i class="fa-solid fa-chevron-right text-[10px] mx-2"></i> <span class="text-navy font-bold">Tra cứu thông tin cổ phiếu</span>
            </div>
            <div class="flex items-center gap-3">
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=1e3a8a&color=fff" class="w-8 h-8 rounded-full border">
                <span class="text-sm font-semibold hidden md:block text-navy">Admin User</span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 mb-6 flex flex-col md:flex-row gap-4 items-center relative">
                <div class="relative flex-1 w-full">
                    <i class="fa-solid fa-search absolute left-4 top-3.5 text-gray-400"></i>
                    <input type="text" id="global-search" onkeyup="filterLookupTable()" 
                           placeholder="Tìm nhanh mã CK hoặc tên công ty..." 
                           class="w-full pl-12 pr-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl outline-none focus:border-navy focus:ring-1 focus:ring-navy transition text-sm">
                </div>

                <div class="relative">
                    <button id="btn-toggle-filter" class="flex items-center gap-2 px-4 py-2.5 bg-white border border-gray-200 rounded-xl hover:bg-gray-50 transition shadow-sm text-sm font-medium text-gray-600">
                        <i class="fa-solid fa-filter text-navy"></i>
                        <span>Bộ lọc kết hợp</span>
                    </button>

                    <div id="filter-menu" class="hidden absolute right-0 mt-2 w-80 bg-white rounded-2xl shadow-2xl border border-gray-100 p-6 z-50 animate-fade-in">
                        <div class="space-y-5">
                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Hiển thị ICB</label>
                                <select id="filter-level-icb" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-navy bg-gray-50">
                                    <option value="l4">Cấp 4 (Mặc định)</option>
                                    <option value="l3">Cấp 3</option>
                                    <option value="l2">Cấp 2</option>
                                    <option value="l1">Cấp 1</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Sàn giao dịch</label>
                                <select id="filter-exchange" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-navy bg-gray-50">
                                    <option value="all">Tất cả các sàn</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Nhóm định nghĩa</label>
                                <select id="filter-user-group" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-navy bg-gray-50">
                                    <option value="all">Tất cả các nhóm</option>
                                    <option value="Chưa phân nhóm">Chưa phân nhóm</option>
                                </select>
                            </div>

                            <div>
                                <label class="block text-[10px] font-bold text-gray-400 uppercase mb-2 tracking-widest">Số dòng</label>
                                <select id="rows-per-page" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm outline-none focus:border-navy bg-gray-50">
                                    <option value="10">10 dòng</option>
                                    <option value="20">20 dòng</option>
                                    <option value="50">50 dòng</option>
                                </select>
                            </div>

                            <div class="pt-2">
                                <button id="btn-apply-lookup" class="w-full bg-navy text-white py-2.5 rounded-xl text-sm font-bold shadow-lg hover:bg-blue-900 transition mb-2">Áp dụng ngay</button>
                                <button id="btn-reset-filters" class="w-full text-gray-400 py-1 text-xs font-medium hover:text-navy transition">Đặt lại tất cả</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse table-nowrap">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 text-[11px] uppercase font-bold tracking-widest">
                                <th class="px-6 py-4 border-b w-32">Mã CK</th>
                                <th class="px-6 py-4 border-b">Doanh nghiệp</th>
                                <th class="px-6 py-4 border-b w-24 text-center">Sàn</th>
                                <th class="px-6 py-4 border-b">Ngành ICB</th>
                                <th class="px-6 py-4 border-b">Nhóm định nghĩa</th>
                            </tr>
                        </thead>
                        <tbody id="lookup-table-body" class="text-sm text-gray-700 divide-y divide-gray-100"></tbody>
                    </table>
                </div>

                <div class="px-6 py-4 bg-gray-50 flex items-center justify-between border-t border-gray-100">
                    <div id="pagination-info" class="text-xs text-gray-400 italic font-medium">Đang chuẩn bị dữ liệu...</div>
                    <div id="pagination-controls"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/tra_cuu.js"></script>
</body>
</html>
