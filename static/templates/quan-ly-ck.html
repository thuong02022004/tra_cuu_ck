<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Danh sách Công ty - ICB Vietnam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/static/js/main.js"></script>
    <script>
        tailwind.config = {
            theme: { 
                extend: { colors: { navy: '#1e3a8a', } } 
            }
        }
    </script>
    <style>
        #file-import { display: none; }
        .progress-bar-fill { transition: width 0.4s ease-in-out; }
        .table-nowrap th, .table-nowrap td { white-space: nowrap; }
        /* Tùy chỉnh thanh cuộn cho mượt hơn */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 flex h-screen overflow-hidden">

    <aside class="w-64 bg-navy text-white flex flex-col shadow-lg hidden md:flex z-20">
        <div class="h-16 flex items-center justify-center border-b border-blue-800">
            <i class="fa-solid fa-chart-pie text-2xl mr-2"></i>
            <h1 class="text-xl font-bold tracking-wider">ICB VIETNAM</h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto font-medium text-sm">
            <a href="index.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition">
                <i class="fa-solid fa-house w-6"></i> Trang chủ
            </a>
            <a href="quan-ly-ck.html" class="flex items-center px-4 py-3 bg-blue-800 rounded-lg shadow-inner">
                <i class="fa-solid fa-building w-6"></i> Quản lý công ty (Mã CK)
            </a>
            <a href="icb.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition">
                <i class="fa-solid fa-layer-group w-6"></i> Quản lý danh mục ICB
            </a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        <header class="h-16 bg-white shadow flex items-center justify-between px-6 z-10">
            <div class="flex items-center text-gray-500 font-medium text-sm">
                <span>Hệ thống</span> <i class="fa-solid fa-chevron-right text-[10px] mx-2"></i> <span class="text-navy font-bold">Quản lý Công ty</span>
            </div>
            <div class="flex items-center gap-3 border-l pl-4 border-gray-200">
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=1e3a8a&color=fff" class="w-8 h-8 rounded-full border border-gray-200">
                <span class="text-sm font-semibold hidden lg:block text-navy">Admin User</span>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-6">
            <div class="flex flex-col xl:flex-row justify-between items-start xl:items-center mb-6 gap-4">
                <div>
                    <h2 class="text-2xl font-bold text-gray-800 tracking-tight">Danh sách Niêm yết</h2>
                    <p class="text-xs text-gray-500">Quản lý mã chứng khoán và thông tin ngành cấp 4</p>
                </div>
                
                <div class="flex flex-wrap items-center gap-3 w-full xl:w-auto">
                    <div class="relative flex-1 md:flex-none md:w-72">
                        <i class="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                        <input type="text" id="search-company" placeholder="Tìm mã CK hoặc tên công ty..." 
                               class="w-full pl-9 pr-4 py-2.5 bg-white border border-gray-300 rounded-lg text-sm outline-none focus:border-navy focus:ring-1 focus:ring-navy transition shadow-sm">
                    </div>

                    <div class="flex items-center gap-2">
                        <input type="file" id="file-import" accept=".csv, .xlsx, .xls" onchange="handleImportCompany()">
                        <button onclick="document.getElementById('file-import').click()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-lg font-medium transition flex items-center text-sm shadow-sm">
                            <i class="fa-solid fa-file-excel mr-2"></i> Import
                        </button>
                        <button id="btn-open-form" class="bg-navy hover:bg-blue-900 text-white px-4 py-2.5 rounded-lg font-medium transition flex items-center text-sm shadow-sm whitespace-nowrap">
                            <i class="fa-solid fa-plus mr-2"></i> Thêm mới
                        </button>
                        <select id="filter-exchange" class="border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:border-navy outline-none bg-white shadow-sm font-medium">
                            <option value="all">Tất cả sàn</option>
                        </select>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse table-nowrap">
                        <thead>
                            <tr class="bg-gray-50 text-gray-500 text-[11px] uppercase font-bold tracking-widest">
                                <th class="px-6 py-4 border-b w-20">ID</th>
                                <th class="px-6 py-4 border-b">Mã CK</th>
                                <th class="px-6 py-4 border-b">Tên Công ty</th>
                                <th class="px-6 py-4 border-b">Sàn</th>
                                <th class="px-6 py-4 border-b">Mã ICB L4</th>
                                <th class="px-6 py-4 border-b text-center">Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="company-table-body" class="text-sm text-gray-700 divide-y divide-gray-100">
                            </tbody>
                    </table>
                </div>

                <div class="px-6 py-4 bg-gray-50 flex flex-col md:flex-row items-center justify-between border-t border-gray-200 gap-4">
                    <div class="flex items-center gap-3">
                        <span class="text-xs text-gray-500 font-bold uppercase tracking-wider">Hiển thị</span>
                        <select id="rows-per-page" class="border border-gray-300 rounded-md px-2 py-1.5 text-xs outline-none focus:border-navy bg-white shadow-sm font-semibold">
                            <option value="10">10 dòng</option>
                            <option value="20">20 dòng</option>
                            <option value="50">50 dòng</option>
                        </select>
                    </div>
                    
                    <div id="pagination-controls" class="flex items-center gap-1"></div>

                    <div id="pagination-info" class="bg-blue-50 px-3 py-1.5 rounded-full border border-blue-100">
                        <span class="text-[11px] text-blue-600 font-bold uppercase">Đang tải dữ liệu...</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/company.js"></script>
</body>
</html>
