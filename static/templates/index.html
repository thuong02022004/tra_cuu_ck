<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICB Vietnam Lookup System - Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { navy: '#1e3a8a' } }
            }
        }
    </script>
    <style>
        /* Hiệu ứng mượt cho Sidebar */
        #sidebar { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 flex h-screen overflow-hidden">

    <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden backdrop-blur-sm transition-opacity"></div>

    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-navy text-white flex flex-col shadow-lg -translate-x-full md:translate-x-0 md:static z-40">
        <div class="h-16 flex items-center justify-between px-6 border-b border-blue-800">
            <div class="flex items-center">
                <i class="fa-solid fa-chart-pie text-2xl mr-2"></i>
                <h1 class="text-xl font-bold tracking-wider uppercase">ICB VIETNAM</h1>
            </div>
            <button id="close-sidebar" class="md:hidden text-white/70 hover:text-white">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
        </div>
        
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto font-medium text-sm">
            <a href="index.html" class="flex items-center px-4 py-3 bg-blue-800 rounded-lg transition shadow-inner">
                <i class="fa-solid fa-house w-6"></i> Trang chủ
            </a>
            <a href="tra-cuu.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition">
                <i class="fa-solid fa-search-plus w-6"></i> Tra cứu tổng hợp
            </a>
            <a href="quan-ly-ck.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition">
                <i class="fa-solid fa-building w-6"></i> Quản lý Mã CK
            </a>
            <a href="nhom-nganh.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition">
                <i class="fa-solid fa-users-viewfinder w-6"></i> Phân loại Nhóm ngành
            </a>
            <a href="nhomcongty.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition">
                <i class="fa-solid fa-folder-tree w-6"></i> Nhóm công ty tự định nghĩa
            </a>
            <a href="icb.html" class="flex items-center px-4 py-3 hover:bg-blue-800 rounded-lg transition">
                <i class="fa-solid fa-layer-group w-6"></i> Danh mục ICB gốc
            </a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden">
        
        <header class="h-16 bg-white shadow flex items-center justify-between px-4 md:px-6 z-20">
            <div class="flex items-center flex-1">
                <button id="open-sidebar" class="md:hidden mr-4 text-navy p-2 hover:bg-gray-100 rounded-lg">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>

                <div class="hidden sm:flex flex-1 max-w-xl items-center bg-gray-100 rounded-full px-4 py-2 border border-gray-200 focus-within:border-navy transition">
                    <i class="fa-solid fa-search text-gray-400 mr-2"></i>
                    <input type="text" placeholder="Tìm kiếm..." class="bg-transparent border-none outline-none w-full text-sm">
                </div>
            </div>
            
            <div class="flex items-center space-x-3 md:space-x-5 ml-2">
                <button class="text-gray-500 hover:text-navy"><i class="fa-solid fa-moon text-lg"></i></button>
                <div class="flex items-center gap-2 cursor-pointer border-l pl-3 md:pl-5 border-gray-300">
                    <img src="https://ui-avatars.com/api/?name=Admin+User&background=1e3a8a&color=fff" alt="Avatar" class="w-8 h-8 rounded-full">
                    <span class="text-sm font-semibold hidden lg:block text-navy">Admin User</span>
                </div>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-6">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-8">
                <div class="bg-white rounded-xl shadow-sm p-4 md:p-6 flex items-center border-l-4 border-navy">
                    <div class="p-3 rounded-full bg-blue-100 text-navy mr-4"><i class="fa-solid fa-building"></i></div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Tổng công ty</p>
                        <p id="total-companies-count" class="text-xl md:text-2xl font-bold text-gray-800">...</p>
                    </div>
                </div>
                
                <div class="bg-white rounded-xl shadow-sm p-4 md:p-6 flex items-center border-l-4 border-green-500">
                    <div class="p-3 rounded-full bg-green-100 text-green-600 mr-4"><i class="fa-solid fa-sitemap"></i></div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Ngành Cấp 1</p>
                        <p id="total-l1-count" class="text-xl md:text-2xl font-bold text-gray-800">...</p>
                    </div>
                </div>
                
                <div class="bg-white rounded-xl shadow-sm p-4 md:p-6 flex items-center border-l-4 border-purple-500">
                    <div class="p-3 rounded-full bg-purple-100 text-purple-600 mr-4"><i class="fa-solid fa-layer-group"></i></div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Ngành Cấp 4</p>
                        <p id="total-l4-count" class="text-xl md:text-2xl font-bold text-gray-800">...</p>
                    </div>
                </div>
                
                <div class="bg-white rounded-xl shadow-sm p-4 md:p-6 flex items-center border-l-4 border-yellow-500">
                    <div class="p-3 rounded-full bg-yellow-100 text-yellow-600 mr-4"><i class="fa-solid fa-coins"></i></div>
                    <div>
                        <p class="text-xs text-gray-500 mb-1">Vốn hóa (Ước tính)</p>
                        <p class="text-xl md:text-2xl font-bold text-gray-800">Dữ liệu</p>
                    </div>
                </div>
            </div>

            <div class="mb-8">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6 bg-white p-4 rounded-xl shadow-sm border">
                    <h3 class="text-lg font-bold text-gray-800">Phân Tích Dữ Liệu ICB</h3>
                    <div class="flex items-center gap-3 w-full sm:w-auto">
                        <select id="stat-level-select" class="w-full sm:w-auto border border-gray-300 rounded-lg px-4 py-2 text-sm outline-none bg-gray-50 cursor-pointer">
                            <option value="1">Ngành Cấp 1</option>
                            <option value="2">Ngành Cấp 2</option>
                            <option value="3">Ngành Cấp 3</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border h-[350px] md:h-[450px] flex flex-col">
                        <h4 class="font-bold text-gray-700 mb-4"><i class="fa-solid fa-chart-column mr-2 text-blue-600"></i> Cơ cấu Ngành con</h4>
                        <div class="flex-1 relative"><canvas id="chart1"></canvas></div>
                    </div>
                    <div class="bg-white p-4 md:p-6 rounded-xl shadow-sm border h-[350px] md:h-[450px] flex flex-col">
                        <h4 class="font-bold text-gray-700 mb-4"><i class="fa-solid fa-chart-pie mr-2 text-emerald-600"></i> Phân bổ theo Sàn</h4>
                        <div class="flex-1 relative"><canvas id="chart3"></canvas></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/main.js"></script>
    <script src="/static/js/responsive-menu.js"></script>
</body>
</html>
